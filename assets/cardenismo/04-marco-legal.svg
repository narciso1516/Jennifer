<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"><style>.bg{fill:#fffdf7}.title{font:700 52px Georgia,serif;fill:#0f3d24}.sub{font:700 30px Arial;fill:#7a461d}.txt{font:22px Arial;fill:#1c271f}.small{font:19px Arial;fill:#1c271f}.box{fill:#fff;stroke-width:4;rx:26}.g{stroke:#0f3d24}.o{stroke:#c85a16}.b{stroke:#0f4e78}.r{stroke:#9c2c1f}.p{stroke:#57306f}.center{fill:#f7f0e5;stroke:#0f3d24;stroke-width:9}</style><rect class="bg" width="1600" height="1000"/><text x="800" y="82" text-anchor="middle" class="title">EL CARDENISMO, UN PARTEAGUAS EN EL AGRARISMO MEXICANO</text><text x="800" y="126" text-anchor="middle" class="sub">4. MARCO LEGAL E INSTITUCIONAL DE LA REFORMA AGRARIA</text><circle cx="800" cy="500" r="210" class="center"/><text x="800" y="390" text-anchor="middle" class="sub">Objetivo jurídico</text><text x="800" y="440" text-anchor="middle" class="txt">Construir un aparato legal</text><text x="800" y="475" text-anchor="middle" class="txt">capaz de hacer efectivo</text><text x="800" y="510" text-anchor="middle" class="txt">el reparto agrario, la restitución,</text><text x="800" y="545" text-anchor="middle" class="txt">la organización ejidal y</text><text x="800" y="580" text-anchor="middle" class="txt">la protección comunitaria.</text><rect x="70" y="170" width="430" height="155" class="box g"/><text x="105" y="215" class="sub">1. Artículo 27</text><text x="105" y="255" class="small">Base constitucional del régimen</text><text x="105" y="284" class="small">agrario y la función social.</text><rect x="1100" y="170" width="430" height="155" class="box p"/><text x="1135" y="215" class="sub">2. Departamento Agrario</text><text x="1135" y="255" class="small">Órgano estatal para conducir</text><text x="1135" y="284" class="small">la política agraria nacional.</text><rect x="70" y="410" width="430" height="155" class="box o"/><text x="105" y="455" class="sub">3. Código Agrario 1934</text><text x="105" y="495" class="small">Sistematiza dotación, restitución,</text><text x="105" y="524" class="small">ampliación y nuevos centros.</text><rect x="1100" y="410" width="430" height="155" class="box r"/><text x="1135" y="455" class="sub">4. Comisiones mixtas</text><text x="1135" y="495" class="small">Mecanismos para estudiar</text><text x="1135" y="524" class="small">y ejecutar repartos agrarios.</text><rect x="70" y="655" width="430" height="155" class="box b"/><text x="105" y="700" class="sub">5. Comisariados</text><text x="105" y="740" class="small">Representación, administración</text><text x="105" y="769" class="small">y vigilancia ejidal y comunal.</text><rect x="1100" y="655" width="430" height="155" class="box g"/><text x="1135" y="700" class="sub">6. Procuraduría</text><text x="1135" y="740" class="small">Defensa jurídica de pueblos</text><text x="1135" y="769" class="small">y comunidades agrarias.</text><rect x="250" y="895" width="1100" height="54" rx="20" fill="#0f4e78"/><text x="800" y="930" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#fff">Clave: sin aparato jurídico, el reparto agrario no podía ejecutarse.</text></svg>