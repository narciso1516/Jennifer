<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"><style>.bg{fill:#fffdf7}.title{font:700 54px Georgia,serif;fill:#0f3d24}.sub{font:700 30px Arial;fill:#7a461d}.txt{font:22px Arial;fill:#1c271f}.small{font:19px Arial;fill:#1c271f}.box{fill:#fff;stroke-width:4;rx:26}.g{stroke:#0f3d24}.o{stroke:#c85a16}.b{stroke:#0f4e78}.r{stroke:#9c2c1f}.p{stroke:#57306f}.center{fill:#f7f0e5;stroke:#0f3d24;stroke-width:9}</style><rect class="bg" width="1600" height="1000"/><text x="800" y="82" text-anchor="middle" class="title">EL CARDENISMO, UN PARTEAGUAS EN EL AGRARISMO MEXICANO</text><text x="800" y="126" text-anchor="middle" class="sub">3. DEL DISCURSO BURGUÉS AL AGRARISMO REVOLUCIONARIO</text><circle cx="800" cy="500" r="210" class="center"/><text x="800" y="390" text-anchor="middle" class="sub">Idea central</text><text x="800" y="440" text-anchor="middle" class="txt">La presión campesina, obrera</text><text x="800" y="475" text-anchor="middle" class="txt">e indígena obliga al Estado</text><text x="800" y="510" text-anchor="middle" class="txt">a abandonar la retórica</text><text x="800" y="545" text-anchor="middle" class="txt">y aplicar una reforma agraria</text><text x="800" y="580" text-anchor="middle" class="txt">real y de masas.</text><rect x="70" y="170" width="430" height="155" class="box g"/><text x="105" y="215" class="sub">1. Discurso oficial</text><text x="105" y="255" class="small">El PNR hablaba de justicia social,</text><text x="105" y="284" class="small">pero el reparto era lento y limitado.</text><rect x="1100" y="170" width="430" height="155" class="box o"/><text x="1135" y="215" class="sub">2. Presión campesina</text><text x="1135" y="255" class="small">Ligas, comunidades y peones</text><text x="1135" y="284" class="small">exigían tierra, agua y justicia.</text><rect x="70" y="410" width="430" height="155" class="box b"/><text x="105" y="455" class="sub">3. Sectores populares</text><text x="105" y="495" class="small">Obreros, indígenas y sectores urbanos</text><text x="105" y="524" class="small">respaldan la causa agraria.</text><rect x="1100" y="410" width="430" height="155" class="box r"/><text x="1135" y="455" class="sub">4. Cambio cardenista</text><text x="1135" y="495" class="small">El Estado pasa de prometer</text><text x="1135" y="524" class="small">a repartir y organizar.</text><rect x="70" y="655" width="430" height="155" class="box p"/><text x="105" y="700" class="sub">5. Factores de ruptura</text><text x="105" y="740" class="small">Crisis, movilización, alianzas</text><text x="105" y="769" class="small">y necesidad de legitimidad estatal.</text><rect x="1100" y="655" width="430" height="155" class="box g"/><text x="1135" y="700" class="sub">6. Resultado</text><text x="1135" y="740" class="small">El agrarismo se vuelve política</text><text x="1135" y="769" class="small">revolucionaria e institucional.</text><path d="M500 245 C590 310 620 385 610 455" fill="none" stroke="#0f3d24" stroke-width="6"/><path d="M1100 245 C1010 310 980 385 990 455" fill="none" stroke="#c85a16" stroke-width="6"/><path d="M500 488 H590" fill="none" stroke="#0f4e78" stroke-width="6"/><path d="M1010 488 H1100" fill="none" stroke="#9c2c1f" stroke-width="6"/><path d="M500 733 C610 690 650 650 680 615" fill="none" stroke="#57306f" stroke-width="6"/><path d="M1100 733 C990 690 950 650 920 615" fill="none" stroke="#0f3d24" stroke-width="6"/><rect x="250" y="895" width="1100" height="54" rx="20" fill="#9c2c1f"/><text x="800" y="930" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#fff">Clave: la reforma agraria surge de la presión social organizada.</text></svg>