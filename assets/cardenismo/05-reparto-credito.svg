<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"><style>.bg{fill:#fffdf7}.title{font:700 54px Georgia,serif;fill:#0f3d24}.sub{font:700 30px Arial;fill:#7a461d}.txt{font:22px Arial;fill:#1c271f}.small{font:19px Arial;fill:#1c271f}.box{fill:#fff;stroke-width:4;rx:26}.g{stroke:#0f3d24}.o{stroke:#c85a16}.b{stroke:#0f4e78}.r{stroke:#9c2c1f}.p{stroke:#57306f}.center{fill:#f7f0e5;stroke:#0f3d24;stroke-width:9}</style><rect class="bg" width="1600" height="1000"/><text x="800" y="82" text-anchor="middle" class="title">EL CARDENISMO, UN PARTEAGUAS EN EL AGRARISMO MEXICANO</text><text x="800" y="126" text-anchor="middle" class="sub">5. REPARTO AGRARIO, COLECTIVIZACIÓN Y CRÉDITO EJIDAL</text><circle cx="800" cy="500" r="210" class="center"/><text x="800" y="390" text-anchor="middle" class="sub">Idea central</text><text x="800" y="440" text-anchor="middle" class="txt">La reforma no solo entregó tierra:</text><text x="800" y="475" text-anchor="middle" class="txt">organizó al campesinado,</text><text x="800" y="510" text-anchor="middle" class="txt">impulsó cooperativas</text><text x="800" y="545" text-anchor="middle" class="txt">y creó crédito para producir.</text><rect x="70" y="170" width="430" height="155" class="box g"/><text x="105" y="215" class="sub">1. Reparto masivo</text><text x="105" y="255" class="small">Afectación de latifundios y</text><text x="105" y="284" class="small">entrega de tierras a campesinos.</text><rect x="1100" y="170" width="430" height="155" class="box b"/><text x="1135" y="215" class="sub">2. Regiones clave</text><text x="1135" y="255" class="small">La Laguna, Yucatán, Yaqui,</text><text x="1135" y="284" class="small">Michoacán, Sinaloa y Veracruz.</text><rect x="70" y="410" width="430" height="155" class="box o"/><text x="105" y="455" class="sub">3. Colectivización</text><text x="105" y="495" class="small">Trabajo colectivo de tierra, agua,</text><text x="105" y="524" class="small">maquinaria e insumos.</text><rect x="1100" y="410" width="430" height="155" class="box r"/><text x="1135" y="455" class="sub">4. Cooperativas</text><text x="1135" y="495" class="small">Organización productiva y social</text><text x="1135" y="524" class="small">para sostener el reparto.</text><rect x="70" y="655" width="430" height="155" class="box p"/><text x="105" y="700" class="sub">5. Crédito ejidal</text><text x="105" y="740" class="small">Banco Nacional de Crédito Ejidal:</text><text x="105" y="769" class="small">avío, refacción y apoyo productivo.</text><rect x="1100" y="655" width="430" height="155" class="box g"/><text x="1135" y="700" class="sub">6. Resultado social</text><text x="1135" y="740" class="small">El ejido se concibe como unidad</text><text x="1135" y="769" class="small">productiva, social y jurídica.</text><rect x="250" y="895" width="1100" height="54" rx="20" fill="#0f3d24"/><text x="800" y="930" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#fff">Clave: tierra + organización + crédito = reforma agraria integral.</text></svg>