<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"><defs><style>.bg{fill:#fffdf7}.title{font:700 54px Georgia,serif;fill:#0f3d24}.sub{font:700 30px Arial;fill:#7a461d}.txt{font:22px Arial;fill:#1c271f}.box{fill:#fff;stroke-width:4;rx:26}.g{stroke:#0f3d24}.o{stroke:#c85a16}.b{stroke:#0f4e78}.r{stroke:#9c2c1f}.p{stroke:#57306f}.y{stroke:#b9832e}.center{fill:#f7f0e5;stroke:#0f3d24;stroke-width:9}.small{font:19px Arial;fill:#1c271f}.num{font:700 34px Arial;fill:#fff}</style></defs><rect class="bg" width="1600" height="1000"/><text x="800" y="82" text-anchor="middle" class="title">EL CARDENISMO, UN PARTEAGUAS EN EL AGRARISMO MEXICANO</text><text x="800" y="126" text-anchor="middle" class="sub">1. MAPA GENERAL DEL CAPÍTULO VIII</text><circle cx="800" cy="500" r="210" class="center"/><text x="800" y="395" text-anchor="middle" class="sub">Idea central</text><text x="800" y="445" text-anchor="middle" class="txt">El cardenismo convierte</text><text x="800" y="480" text-anchor="middle" class="txt">demandas históricas del campo</text><text x="800" y="515" text-anchor="middle" class="txt">en política social del Estado:</text><text x="800" y="550" text-anchor="middle" class="txt">reparto, instituciones, crédito,</text><text x="800" y="585" text-anchor="middle" class="txt">expropiación y derecho agrario social.</text><g><rect x="70" y="180" width="410" height="150" class="box g"/><text x="105" y="225" class="sub">1. Institucionalización</text><text x="105" y="265" class="small">El agrarismo deja de ser solo lucha</text><text x="105" y="294" class="small">social y entra al aparato estatal.</text></g><g><rect x="1120" y="180" width="410" height="150" class="box p"/><text x="1155" y="225" class="sub">2. Movimiento de masas</text><text x="1155" y="265" class="small">Campesinos, obreros, indígenas</text><text x="1155" y="294" class="small">y sectores populares sostienen el proyecto.</text></g><g><rect x="70" y="420" width="410" height="150" class="box o"/><text x="105" y="465" class="sub">3. Tierra y Libertad</text><text x="105" y="505" class="small">Retoma la consigna zapatista</text><text x="105" y="534" class="small">y el sentido social del artículo 27.</text></g><g><rect x="1120" y="420" width="410" height="150" class="box r"/><text x="1155" y="465" class="sub">4. Reforma agraria</text><text x="1155" y="505" class="small">Reparto de tierras, ejidos, comunidades,</text><text x="1155" y="534" class="small">cooperativas y nuevas instituciones.</text></g><g><rect x="70" y="665" width="410" height="150" class="box b"/><text x="105" y="710" class="sub">5. Soberanía nacional</text><text x="105" y="750" class="small">La reforma enfrenta latifundios,</text><text x="105" y="779" class="small">capital extranjero y dependencia económica.</text></g><g><rect x="1120" y="665" width="410" height="150" class="box y"/><text x="1155" y="710" class="sub">6. Legado jurídico</text><text x="1155" y="750" class="small">Consolida las bases del derecho</text><text x="1155" y="779" class="small">agrario social mexicano.</text></g><path d="M480 255 C590 300 620 380 600 450" fill="none" stroke="#0f3d24" stroke-width="6"/><path d="M1120 255 C1010 300 980 380 1000 450" fill="none" stroke="#57306f" stroke-width="6"/><path d="M480 495 H590" fill="none" stroke="#c85a16" stroke-width="6"/><path d="M1010 495 H1120" fill="none" stroke="#9c2c1f" stroke-width="6"/><path d="M480 740 C610 690 645 650 675 615" fill="none" stroke="#0f4e78" stroke-width="6"/><path d="M1120 740 C990 690 955 650 925 615" fill="none" stroke="#b9832e" stroke-width="6"/><rect x="250" y="895" width="1100" height="54" rx="20" fill="#0f3d24"/><text x="800" y="930" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#fff">Síntesis: del problema agrario al derecho agrario social de Estado.</text></svg>