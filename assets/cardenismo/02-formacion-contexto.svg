<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"><style>.bg{fill:#fffdf7}.title{font:700 54px Georgia,serif;fill:#0f3d24}.sub{font:700 30px Arial;fill:#7a461d}.txt{font:22px Arial;fill:#1c271f}.small{font:19px Arial;fill:#1c271f}.box{fill:#fff;stroke-width:4;rx:26}.g{stroke:#0f3d24}.o{stroke:#c85a16}.b{stroke:#0f4e78}.r{stroke:#9c2c1f}.p{stroke:#57306f}.center{fill:#f7f0e5;stroke:#0f3d24;stroke-width:9}</style><rect class="bg" width="1600" height="1000"/><text x="800" y="82" text-anchor="middle" class="title">EL CARDENISMO, UN PARTEAGUAS EN EL AGRARISMO MEXICANO</text><text x="800" y="126" text-anchor="middle" class="sub">2. FORMACIÓN DEL CARDENISMO Y CONTEXTO SOCIAL DEL CAMPO</text><circle cx="800" cy="500" r="210" class="center"/><text x="800" y="390" text-anchor="middle" class="sub">Tesis</text><text x="800" y="440" text-anchor="middle" class="txt">El cardenismo no surge</text><text x="800" y="475" text-anchor="middle" class="txt">de manera espontánea:</text><text x="800" y="510" text-anchor="middle" class="txt">es respuesta a crisis económica,</text><text x="800" y="545" text-anchor="middle" class="txt">latifundismo, maximato y presión</text><text x="800" y="580" text-anchor="middle" class="txt">de campesinos sin tierra.</text><rect x="70" y="170" width="430" height="155" class="box g"/><text x="105" y="215" class="sub">1. Herencia del maximato</text><text x="105" y="255" class="small">Control político de Calles, PNR</text><text x="105" y="284" class="small">y reforma agraria limitada.</text><rect x="1100" y="170" width="430" height="155" class="box p"/><text x="1135" y="215" class="sub">2. Crisis de 1929</text><text x="1135" y="255" class="small">Desempleo, pobreza rural y</text><text x="1135" y="284" class="small">caída de precios agrícolas.</text><rect x="70" y="410" width="430" height="155" class="box o"/><text x="105" y="455" class="sub">3. Campo mexicano</text><text x="105" y="495" class="small">Campesinos sin tierra, peones,</text><text x="105" y="524" class="small">jornaleros y pueblos despojados.</text><rect x="1100" y="410" width="430" height="155" class="box r"/><text x="1135" y="455" class="sub">4. Formación de Cárdenas</text><text x="1135" y="495" class="small">Experiencia revolucionaria, contacto</text><text x="1135" y="524" class="small">con comunidades y sentido agrarista.</text><rect x="70" y="655" width="430" height="155" class="box b"/><text x="105" y="700" class="sub">5. Influencias sociales</text><text x="105" y="740" class="small">Zapatismo, magonismo, socialismo</text><text x="105" y="769" class="small">y ligas campesinas.</text><rect x="1100" y="655" width="430" height="155" class="box g"/><text x="1135" y="700" class="sub">6. Nacionalismo</text><text x="1135" y="740" class="small">Reforma agraria ligada a soberanía,</text><text x="1135" y="769" class="small">antiimperialismo y justicia social.</text><path d="M500 245 C590 310 620 385 610 455" fill="none" stroke="#0f3d24" stroke-width="6"/><path d="M1100 245 C1010 310 980 385 990 455" fill="none" stroke="#57306f" stroke-width="6"/><path d="M500 488 H590" fill="none" stroke="#c85a16" stroke-width="6"/><path d="M1010 488 H1100" fill="none" stroke="#9c2c1f" stroke-width="6"/><path d="M500 733 C610 690 650 650 680 615" fill="none" stroke="#0f4e78" stroke-width="6"/><path d="M1100 733 C990 690 950 650 920 615" fill="none" stroke="#0f3d24" stroke-width="6"/><rect x="250" y="895" width="1100" height="54" rx="20" fill="#7a461d"/><text x="800" y="930" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#fff">Clave: la reforma cardenista responde a una crisis estructural del campo.</text></svg>