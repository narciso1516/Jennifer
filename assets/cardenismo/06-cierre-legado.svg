<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"><style>.bg{fill:#fffdf7}.title{font:700 54px Georgia,serif;fill:#0f3d24}.sub{font:700 30px Arial;fill:#7a461d}.txt{font:22px Arial;fill:#1c271f}.small{font:19px Arial;fill:#1c271f}.box{fill:#fff;stroke-width:4;rx:26}.g{stroke:#0f3d24}.o{stroke:#c85a16}.b{stroke:#0f4e78}.r{stroke:#9c2c1f}.p{stroke:#57306f}.center{fill:#f7f0e5;stroke:#0f3d24;stroke-width:9}</style><rect class="bg" width="1600" height="1000"/><text x="800" y="82" text-anchor="middle" class="title">EL CARDENISMO, UN PARTEAGUAS EN EL AGRARISMO MEXICANO</text><text x="800" y="126" text-anchor="middle" class="sub">6. CIERRE DEL CARDENISMO: EXPROPIACIÓN, PUEBLOS INDIOS, CÓDIGO DE 1940 Y LEGADO</text><circle cx="800" cy="500" r="210" class="center"/><text x="800" y="390" text-anchor="middle" class="sub">Síntesis final</text><text x="800" y="440" text-anchor="middle" class="txt">La etapa final consolida</text><text x="800" y="475" text-anchor="middle" class="txt">una reforma agraria social:</text><text x="800" y="510" text-anchor="middle" class="txt">expropiación, bienes comunales,</text><text x="800" y="545" text-anchor="middle" class="txt">Código Agrario de 1940</text><text x="800" y="580" text-anchor="middle" class="txt">y legado jurídico duradero.</text><rect x="70" y="170" width="430" height="155" class="box g"/><text x="105" y="215" class="sub">1. Expropiación 1936</text><text x="105" y="255" class="small">Afectar propiedad por causa</text><text x="105" y="284" class="small">de utilidad pública.</text><rect x="1100" y="170" width="430" height="155" class="box o"/><text x="1135" y="215" class="sub">2. Latifundios</text><text x="1135" y="255" class="small">Afectación de grandes propiedades</text><text x="1135" y="284" class="small">nacionales y extranjeras.</text><rect x="70" y="410" width="430" height="155" class="box b"/><text x="105" y="455" class="sub">3. Ganadería</text><text x="105" y="495" class="small">Concesiones y certificados de</text><text x="105" y="524" class="small">inafectabilidad ganadera.</text><rect x="1100" y="410" width="430" height="155" class="box p"/><text x="1135" y="455" class="sub">4. Parques nacionales</text><text x="1135" y="495" class="small">Vocación ecológica y defensa</text><text x="1135" y="524" class="small">de recursos naturales.</text><rect x="70" y="655" width="430" height="155" class="box r"/><text x="105" y="700" class="sub">5. Código 1940</text><text x="105" y="740" class="small">Comunidades de hecho, bienes</text><text x="105" y="769" class="small">comunales y justicia expedita.</text><rect x="1100" y="655" width="430" height="155" class="box g"/><text x="1135" y="700" class="sub">6. Legado</text><text x="1135" y="740" class="small">Bases del derecho agrario social,</text><text x="1135" y="769" class="small">ejido, comunidad y soberanía.</text><rect x="250" y="895" width="1100" height="54" rx="20" fill="#7a461d"/><text x="800" y="930" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#fff">Clave: la propiedad se reordena en función del interés social.</text></svg>