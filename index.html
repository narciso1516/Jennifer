<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Jennifer | Ejercicios resueltos EXANI-II</title><style>:root{--b:#1a73e8;--p:#9334e6;--m:#d93075;--o:#f9ab00;--g:#188038;--r:#d93025;--t:#202124;--mut:#64748b;--line:#e8eaed}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Arial,sans-serif;background:radial-gradient(circle at 10% 0,rgba(26,115,232,.32),transparent 34%),radial-gradient(circle at 92% 8%,rgba(217,48,117,.25),transparent 34%),linear-gradient(135deg,#0f172a,#312e81,#831843);display:flex;justify-content:center;align-items:center;padding:16px;color:var(--t)}.phone{width:min(430px,100%);height:min(900px,calc(100vh - 20px));min-height:720px;background:#050505;border-radius:54px;padding:12px;box-shadow:0 40px 100px rgba(0,0,0,.55),inset 0 0 0 2px rgba(255,255,255,.12)}.screen{height:100%;border-radius:43px;overflow:hidden;position:relative;background:linear-gradient(180deg,#f8fbff,#f7efff 58%,#fff7e3)}.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:126px;height:33px;background:#050505;border-radius:0 0 20px 20px;z-index:20}.status{position:absolute;top:0;left:0;right:0;height:52px;display:flex;justify-content:space-between;align-items:center;padding:12px 28px 0;font-weight:850;font-size:14px;z-index:15}.app{height:100%;overflow:auto;-webkit-overflow-scrolling:touch;padding:58px 14px 92px}.hero{background:linear-gradient(135deg,var(--b),var(--p),var(--m));color:#fff;border-radius:32px;padding:22px 18px;box-shadow:0 24px 60px rgba(30,41,59,.24);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:-70px;background:radial-gradient(circle at 20% 15%,rgba(255,255,255,.35),transparent 30%),radial-gradient(circle at 80% 30%,rgba(255,255,255,.22),transparent 28%);animation:f 9s infinite alternate}@keyframes f{to{transform:translateY(22px) scale(1.05)}}.hero>*{position:relative}.k{display:inline-flex;padding:7px 10px;border-radius:99px;background:rgba(255,255,255,.2);font-size:11px;font-weight:950;text-transform:uppercase}h1{font-size:31px;line-height:.98;margin:12px 0 8px;letter-spacing:-.06em}.hero p{margin:0;color:rgba(255,255,255,.92);font-size:14px;line-height:1.45}.card{margin-top:12px;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.68);border-radius:28px;padding:16px;box-shadow:0 15px 40px rgba(15,23,42,.12);backdrop-filter:blur(18px)}.toc{display:grid;gap:8px}.toc button{background:#fff;color:#174ea6;text-align:left;box-shadow:0 10px 22px rgba(60,64,67,.08);border:1px solid rgba(226,232,240,.9)}.badge{display:inline-flex;margin:2px 4px 9px 0;padding:7px 10px;border-radius:99px;background:#eef3fe;color:#174ea6;font-size:11px;font-weight:950}.easy{background:#e6f4ea;color:#0d652d}.basic{background:#fef7e0;color:#9a6700}.adv{background:#fde7f3;color:#9c166b}h2{font-size:24px;line-height:1.05;margin:6px 0 9px;letter-spacing:-.045em}h3{font-size:18px;margin:0 0 8px;color:#174ea6}.lead{font-size:14px;line-height:1.48;color:#475569;margin:0 0 12px}.ex{background:#fff;border:1px solid rgba(226,232,240,.9);border-radius:22px;padding:14px;margin:12px 0}.q{font-size:16px;line-height:1.35;font-weight:900}.ans{margin-top:8px;background:#f8fbff;border:1px dashed #c7d2fe;border-radius:16px;padding:12px;line-height:1.5;font-size:14px}.step{display:grid;grid-template-columns:30px 1fr;gap:8px;margin:9px 0}.n{width:28px;height:28px;border-radius:11px;background:linear-gradient(135deg,var(--b),var(--p));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:950}.why{border-left:5px solid var(--o);background:#fff8e1;color:#744d00;border-radius:15px;padding:10px;font-size:13px;line-height:1.4;margin-top:8px}.coach{border-left:5px solid var(--g);background:#e6f4ea;color:#0d652d;border-radius:15px;padding:10px;font-size:13px;line-height:1.4;margin-top:8px;font-weight:750}.formula{font-weight:950;background:#f1f5ff;border-radius:12px;padding:8px;margin:6px 0}button{min-height:50px;border:0;border-radius:17px;padding:13px 15px;font-weight:950;font-size:15px;color:white;background:linear-gradient(135deg,var(--b),var(--p),var(--m));box-shadow:0 12px 24px rgba(147,52,230,.22)}button:active{transform:scale(.985)}.tabs{position:absolute;left:18px;right:18px;bottom:14px;height:64px;border-radius:24px;background:rgba(255,255,255,.82);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.7);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;z-index:30;box-shadow:0 15px 35px rgba(15,23,42,.22)}.tabs button{min-height:auto;border-radius:18px;font-size:10px;padding:5px;background:transparent;color:#475569;box-shadow:none}.tabs button.on{background:#eef3fe;color:#174ea6}.home{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:135px;height:5px;background:#111827;border-radius:99px;z-index:35;opacity:.75}@media(max-width:480px){body{padding:0}.phone{width:100%;height:100vh;min-height:100vh;border-radius:0;padding:0}.screen{border-radius:0}.notch{top:0}.tabs{left:10px;right:10px;bottom:8px}.home{bottom:2px}}</style></head><body><div class="phone"><div class="screen"><div class="notch"></div><div class="status"><span id="clock">9:41</span><span>📶 Wi‑Fi 🔋</span></div><main class="app"><section class="hero"><span class="k">Jennifer · EXANI-II</span><h1>24 ejercicios resueltos</h1><p>Por cada tema: 2 sencillos, 2 básicos y 2 avanzados. Todo explicado con pasos cortos y justificación.</p></section><section class="card"><h2>Temas</h2><div class="toc"><button onclick="go('porc')">1. Porcentajes</button><button onclick="go('raz')">2. Razones y proporciones</button><button onclick="go('frac')">3. División de fracciones</button><button onclick="go('pot')">4. Potencias y raíces</button></div></section><div id="content"></div></main><nav class="tabs"><button class="on" onclick="go('porc')">%<br>Porc.</button><button onclick="go('raz')">↔<br>Raz.</button><button onclick="go('frac')">½<br>Frac.</button><button onclick="go('pot')">√<br>Pot.</button></nav><div class="home"></div></div></div><script>const data={porc:{title:'1. Porcentajes',intro:'Jennifer debe identificar si le piden una parte, un total, un descuento o un aumento. Esa decisión indica si multiplica o divide.',ex:[['Sencillo','¿Cuánto es el 10% de 200?',['10% significa 10 de cada 100.','Convertimos 10% a decimal: 10% = 0.10.','Multiplicamos el total por el decimal: 200 × 0.10 = 20.'],'Respuesta: 20','Se multiplica porque te piden una parte de 200.'],['Sencillo','¿Cuánto es el 20% de 150?',['20% = 0.20.','150 × 0.20 = 30.'],'Respuesta: 30','Cuando dice “el 20% de una cantidad”, multiplicamos.'],['Básico','Un vestido cuesta $500 y tiene 10% de descuento. ¿Cuánto se descuenta?',['Primero convertimos: 10% = 0.10.','Calculamos el descuento: 500 × 0.10 = 50.'],'Respuesta: se descuentan $50','La pregunta pide cuánto se descuenta, no el precio final.'],['Básico','Un examen tiene 80 preguntas. Jennifer necesita 75%. ¿Cuántas debe contestar bien?',['75% = 0.75.','Calculamos la parte: 80 × 0.75 = 60.'],'Respuesta: 60 preguntas','Se multiplica porque buscamos una parte de un total.'],['Avanzado','Si una cantidad aumenta de 80 a 100, ¿cuál fue el porcentaje de aumento?',['Calculamos cuánto aumentó: 100 − 80 = 20.','Dividimos el aumento entre el valor inicial: 20 ÷ 80 = 0.25.','Convertimos a porcentaje: 0.25 × 100 = 25%.'],'Respuesta: 25%','El porcentaje de aumento siempre usa como base el valor inicial, que era 80.'],['Avanzado','Si el 40% de un número es 120, ¿cuál es el número?',['40% = 0.40.','Como 120 es solo una parte, usamos: total = parte ÷ porcentaje.','120 ÷ 0.40 = 300.'],'Respuesta: 300','Se divide porque ya tenemos la parte y buscamos el total.']]},raz:{title:'2. Razones y proporciones',intro:'Una razón compara cantidades. En trabajo con personas y tiempo, normalmente es proporción inversa: menos personas tardan más.',ex:[['Sencillo','Hay 12 mujeres y 8 hombres. ¿Cuál es la razón mujeres:hombres?',['Escribimos en el orden pedido: 12:8.','Simplificamos dividiendo entre 4: 12 ÷ 4 = 3 y 8 ÷ 4 = 2.'],'Respuesta: 3:2','El orden importa: mujeres:hombres.'],['Sencillo','Hay 15 niñas y 10 niños. ¿Cuál es la razón niñas:niños?',['Escribimos 15:10.','Dividimos ambos entre 5: 15 ÷ 5 = 3 y 10 ÷ 5 = 2.'],'Respuesta: 3:2','Una razón se simplifica igual que una fracción.'],['Básico','Si 3 cuadernos cuestan $45, ¿cuánto cuestan 5 cuadernos?',['Primero calculamos 1 cuaderno: 45 ÷ 3 = 15.','Luego multiplicamos por 5: 15 × 5 = 75.'],'Respuesta: $75','Buscar el valor de uno hace más fácil el problema.'],['Básico','Una receta usa 2 tazas de harina para 8 galletas. ¿Cuántas tazas necesita para 24 galletas?',['Vemos cuántas veces creció: 24 ÷ 8 = 3.','Multiplicamos las tazas por 3: 2 × 3 = 6.'],'Respuesta: 6 tazas','Si las galletas se triplican, la harina también se triplica.'],['Avanzado','Si 4 personas pintan una pared en 6 horas, ¿cuánto tarda 1 persona?',['Calculamos el trabajo total: 4 × 6 = 24 horas-persona.','Si trabaja 1 persona: 24 ÷ 1 = 24.'],'Respuesta: 24 horas','Es proporción inversa: menos personas, más tiempo.'],['Avanzado','Si 6 trabajadores terminan una obra en 10 días, ¿cuánto tardan 3 trabajadores?',['Trabajo total: 6 × 10 = 60 jornadas.','Ahora dividimos entre 3 trabajadores: 60 ÷ 3 = 20.'],'Respuesta: 20 días','Al reducir trabajadores a la mitad, el tiempo se duplica.']]},frac:{title:'3. División de fracciones',intro:'Regla clave para Jennifer: dejo la primera fracción, cambio división por multiplicación y volteo la segunda.',ex:[['Sencillo','Resuelve: 1/2 ÷ 1/4',['Dejo 1/2.','Cambio ÷ por × y volteo 1/4 a 4/1.','Multiplico: 1/2 × 4/1 = 4/2 = 2.'],'Respuesta: 2','Solo se voltea la segunda fracción.'],['Sencillo','Resuelve: 2/3 ÷ 1/3',['Dejo 2/3.','Cambio y volteo: 2/3 × 3/1.','Multiplico: 6/3 = 2.'],'Respuesta: 2','Dividir fracciones no es restar ni dividir directo.'],['Básico','Resuelve: 3/4 ÷ 2/5',['Dejo 3/4.','Cambio y volteo: 3/4 × 5/2.','Multiplico: 3×5=15 y 4×2=8.'],'Respuesta: 15/8','Aplicamos dejo, cambio y volteo.'],['Básico','Resuelve: 5/8 ÷ 1/4',['Dejo 5/8.','Cambio y volteo: 5/8 × 4/1.','Multiplico: 20/8. Simplifico: 20/8 = 5/2.'],'Respuesta: 5/2','Siempre simplificamos si se puede.'],['Avanzado','Resuelve: 6/5 ÷ 3/10',['Dejo 6/5.','Cambio y volteo: 6/5 × 10/3.','Multiplico: 60/15.','Simplifico: 60 ÷ 15 = 4.'],'Respuesta: 4','Aunque parezca grande, solo sigue la regla.'],['Avanzado','Resuelve: 4/7 ÷ 2/7',['Dejo 4/7.','Cambio y volteo: 4/7 × 7/2.','Multiplico: 28/14 = 2.'],'Respuesta: 2','Cuando son fracciones parecidas, muchas partes se cancelan al simplificar.']]},pot:{title:'4. Potencias y raíces',intro:'Primero se resuelven raíces y potencias. Después se suma, resta o multiplica.',ex:[['Sencillo','Resuelve: 2³',['2³ significa 2 × 2 × 2.','2 × 2 = 4 y 4 × 2 = 8.'],'Respuesta: 8','No es 2 × 3; es multiplicar el 2 tres veces.'],['Sencillo','Resuelve: √81',['Buscamos el número que multiplicado por sí mismo da 81.','9 × 9 = 81.'],'Respuesta: 9','La raíz cuadrada pregunta: ¿qué número al cuadrado da esto?'],['Básico','Resuelve: √64 + 2³',['Primero la raíz: √64 = 8.','Luego la potencia: 2³ = 8.','Sumamos: 8 + 8 = 16.'],'Respuesta: 16','No se suma 64 + 2; primero se resuelve cada parte.'],['Básico','Resuelve: √100 × 2²',['Primero la raíz: √100 = 10.','Luego la potencia: 2² = 4.','Multiplicamos: 10 × 4 = 40.'],'Respuesta: 40','La raíz y la potencia se hacen antes de multiplicar.'],['Avanzado','Resuelve: 3² + 4²',['3² = 3×3 = 9.','4² = 4×4 = 16.','Sumamos: 9 + 16 = 25.'],'Respuesta: 25','Primero potencias, luego suma.'],['Avanzado','Resuelve: 2³ × 3²',['2³ = 8.','3² = 9.','Multiplicamos: 8 × 9 = 72.'],'Respuesta: 72','Primero potencias; después la multiplicación final.']]}};function cls(n){return n==='Sencillo'?'easy':n==='Básico'?'basic':'adv'}function render(key){document.querySelectorAll('.tabs button').forEach((b,i)=>b.classList.toggle('on',['porc','raz','frac','pot'][i]===key));let d=data[key];document.getElementById('content').innerHTML='<section class="card" id="'+key+'"><span class="badge">Tema</span><h2>'+d.title+'</h2><p class="lead">'+d.intro+'</p>'+d.ex.map((e,i)=>'<div class="ex"><span class="badge '+cls(e[0])+'">'+e[0]+'</span><h3>Ejercicio '+(i+1)+'</h3><div class="q">'+e[1]+'</div><div class="ans">'+e[2].map((s,j)=>'<div class="step"><div class="n">'+(j+1)+'</div><div>'+s+'</div></div>').join('')+'<div class="formula">'+e[3]+'</div><div class="why"><b>Justificación:</b> '+e[4]+'</div></div></div>').join('')+'<div class="coach">Regla para Jenny: antes de resolver, identifica qué tipo de pregunta es. Así eliges la operación correcta.</div></section>';document.querySelector('.app').scrollTo(0,0)}function go(k){render(k)}function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit'});}setInterval(tick,1000);tick();render('porc');</script></body></html>
