<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1026">
  <meta http-equiv="refresh" content="1; url=./exani-quest/">
  <title>Jennifer · EXANI Quest</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100svh;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',Segoe UI,sans-serif;color:white;background:radial-gradient(circle at 10% 0%,rgba(0,178,255,.38),transparent 280px),radial-gradient(circle at 95% 8%,rgba(255,78,205,.35),transparent 280px),linear-gradient(145deg,#0b1026,#17205a 48%,#6d28d9 82%,#ff4ecd 130%);display:grid;place-items:center;padding:22px}
    .card{width:min(100%,420px);border-radius:34px;padding:26px 20px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);box-shadow:0 22px 60px rgba(0,0,0,.35);backdrop-filter:blur(18px)}
    .orb{width:58px;height:58px;border-radius:22px;background:conic-gradient(from 190deg,#00b2ff,#8b5cf6,#ff4ecd,#00b2ff);box-shadow:0 16px 36px rgba(255,78,205,.36);margin-bottom:14px}
    .pill{display:inline-block;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);font-size:12px;font-weight:900}
    h1{font-size:38px;line-height:.92;letter-spacing:-.07em;margin:16px 0 12px}
    p{line-height:1.48;color:rgba(255,255,255,.84);font-size:15px;margin:0 0 18px}
    a{display:block;text-align:center;text-decoration:none;color:white;font-weight:950;border-radius:24px;padding:17px 16px;background:linear-gradient(135deg,#1a73e8,#8b5cf6,#ff4ecd);box-shadow:0 18px 40px rgba(109,40,217,.32)}
    .small{font-size:12px;margin-top:13px;color:rgba(255,255,255,.72);text-align:center}
  </style>
</head>
<body>
  <main class="card">
    <div class="orb"></div>
    <span class="pill">iPhone · 50 preguntas · modo reto</span>
    <h1>EXANI Quest para Jennifer</h1>
    <p>Te estoy llevando al juego completo con paleta Gemini. Si no abre automáticamente, toca el botón.</p>
    <a href="./exani-quest/">Abrir juego completo</a>
    <div class="small">No muestra respuestas si falla. Reinicia y registra el tema difícil.</div>
  </main>
  <script>setTimeout(()=>location.replace('./exani-quest/'),600)</script>
</body>
</html>
