<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Refuerzo Jennifer</title>
<style>
:root{--blue:#007AFF;--purple:#AF52DE;--pink:#FF2D55;--green:#34C759;--red:#FF3B30;--yellow:#FFCC00;--bg:#F2F2F7;--text:#1C1C1E;--muted:#6E6E73;--line:rgba(60,60,67,.18);--card:rgba(255,255,255,.88)}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 10% 0%,rgba(0,122,255,.18),transparent 28%),radial-gradient(circle at 90% 12%,rgba(175,82,222,.18),transparent 26%),var(--bg);min-height:100vh}.app{max-width:820px;margin:0 auto;padding:18px 14px 34px}.card{background:var(--card);border:1px solid rgba(255,255,255,.8);border-radius:28px;padding:18px;box-shadow:0 18px 42px rgba(0,0,0,.12);backdrop-filter:blur(16px)}.badge{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(0,122,255,.11);color:#005bb5;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}h1{font-size:clamp(32px,8vw,56px);line-height:.98;letter-spacing:-.055em;margin:18px 0 12px}.grad{background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent}.sub{color:#3A3A3C;line-height:1.55}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}.stat b{display:block;font-size:24px}.stat span{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase}.btn{width:100%;min-height:54px;border:0;border-radius:18px;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;font-size:17px;font-weight:900;box-shadow:0 14px 28px rgba(0,122,255,.24)}.btn:active,.opt:active{transform:scale(.985)}.top{position:sticky;top:0;z-index:10;padding:10px 0;background:linear-gradient(180deg,rgba(242,242,247,.96),rgba(242,242,247,.72),transparent)}.barbox{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:22px;padding:12px}.row{display:flex;justify-content:space-between;gap:8px;align-items:center}.small{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase}.bar{height:10px;background:#E5E5EA;border-radius:999px;overflow:hidden;margin-top:10px}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--blue),var(--purple));transition:.25s}.screen{display:none}.topic{margin-top:12px}.chip{display:inline-block;padding:8px 11px;border-radius:999px;background:rgba(88,86,214,.10);color:#3B37A6;font-size:12px;font-weight:900;text-transform:uppercase}.topic h2{font-size:28px;letter-spacing:-.045em;margin:12px 0 8px}.fail{background:rgba(255,204,0,.22);border:1px solid rgba(255,204,0,.45);border-radius:18px;padding:12px;font-weight:800;color:#6b4e00}.rule{background:linear-gradient(135deg,rgba(52,199,89,.12),rgba(0,122,255,.10));border:1px solid rgba(52,199,89,.22);border-radius:20px;padding:14px;font-weight:850;line-height:1.45;margin:12px 0}.q{font-size:20px;font-weight:950;line-height:1.25}.opts{display:grid;gap:10px}.opt{border:1px solid var(--line);background:white;border-radius:20px;padding:13px;text-align:left;display:grid;grid-template-columns:34px 1fr;gap:10px;font-size:15px;font-weight:800;line-height:1.38}.letter{width:32px;height:32px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;display:flex;align-items:center;justify-content:center;font-weight:950}.ok{background:rgba(52,199,89,.12)!important;border-color:rgba(52,199,89,.55)!important}.bad{background:rgba(255,59,48,.09)!important;border-color:rgba(255,59,48,.55)!important}.fb{display:none;margin-top:12px;border-radius:18px;padding:13px;font-weight:750;line-height:1.45;background:#fff;border:1px solid var(--line)}.fb.good{display:block;background:rgba(52,199,89,.1);color:#14532D}.fb.wrong{display:block;background:rgba(255,59,48,.08);color:#7F1D1D}.result{background:white;border:1px solid var(--line);border-radius:18px;padding:12px;margin:8px 0;text-align:left;font-weight:800}.score{font-size:56px;font-weight:950;letter-spacing:-.06em;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent}@media(max-width:430px){.stats{grid-template-columns:1fr 1fr}.stat:last-child{grid-column:1/-1}.card{border-radius:24px}.topic h2{font-size:25px}.q{font-size:19px}.opt{font-size:14.5px}}
</style>
</head>
<body>
<div class="app">
<section id="home" class="card"><span class="badge">🍎 Refuerzo Jennifer</span><h1><span class="grad">Corrección inteligente</span><br>de sus 4 errores</h1><p class="sub">Se explica cada tema y luego Jennifer contesta 5 ejercicios. Son 4 temas y 20 ejercicios en total.</p><div class="stats"><div class="stat"><b>4</b><span>temas</span></div><div class="stat"><b>20</b><span>ejercicios</span></div><div class="stat"><b>iOS</b><span>estilo</span></div></div><button class="btn" onclick="start()">Iniciar refuerzo</button></section>
<section id="work" class="screen"><div class="top"><div class="barbox"><div class="row"><div><div class="small">Tema actual</div><b id="topTitle">Tema</b></div><div id="topN" class="small">1 de 4</div></div><div class="bar"><div id="fill" class="fill"></div></div></div></div><div id="content" class="card topic"></div></section>
<section id="end" class="card screen" style="text-align:center"><span class="badge">✅ Terminado</span><h1>Resultado</h1><div class="score"><span id="score">0</span>/20</div><div id="breakdown"></div><button class="btn" onclick="start()">Repetir</button></section>
</div>
<script>
const topics=[
{t:"Concordancia con la mayoría",emoji:"🧠",fallo:"Pregunta 50: La mayoría de los aspirantes respondieron correctamente la pregunta.",exp:"En redacción formal, el sujeto principal es la mayoría. Aunque después aparezca de los aspirantes, el verbo puede ir en singular: La mayoría respondió.",regla:"Pregunta: ¿quién hizo la acción? Si la respuesta es la mayoría, usa verbo en singular.",qs:[
{q:"La mayoría de los alumnos ______ temprano al examen.",o:["llegaron","llegó","llegarán","llegando"],a:1,w:"El núcleo es la mayoría; por eso: llegó."},
{q:"La mayoría de las aspirantes ______ sus documentos completos.",o:["entregó","entregaron","entregando","entregar"],a:0,w:"La mayoría funciona como núcleo singular: entregó."},
{q:"La mayoría de los estudiantes ______ la lectura antes de contestar.",o:["leyeron","leyendo","leyó","leer"],a:2,w:"El verbo concuerda con la mayoría: leyó."},
{q:"La mayoría de los participantes ______ las instrucciones.",o:["comprendieron","comprendió","comprender","comprendiendo"],a:1,w:"En estilo formal: la mayoría comprendió."},
{q:"La mayoría de las personas ______ afectada por la crisis económica.",o:["fueron","era","estuvo","estaban"],a:2,w:"La mayoría pide forma singular: estuvo afectada."}]},
{t:"Uso de más y mas",emoji:"✍️",fallo:"Pregunta 47: Jennifer necesita practicar más ejercicios.",exp:"Más con tilde indica cantidad o comparación. Mas sin tilde equivale a pero.",regla:"Si puedes cambiarlo por pero, escribe mas. Si habla de cantidad, escribe más.",qs:[
{q:"Jennifer necesita practicar ______ preguntas de redacción.",o:["mas","más","más,","mas,"],a:1,w:"Habla de cantidad: más preguntas."},
{q:"Estudió durante toda la tarde, ______ no comprendió el tema.",o:["más","mas","más,","más que"],a:1,w:"Equivale a pero: estudió, mas no comprendió."},
{q:"Para mejorar, debe leer ______ textos de comprensión.",o:["mas","más","más pero","mas que"],a:1,w:"Habla de cantidad: más textos."},
{q:"Quería terminar el simulacro, ______ se le acabó el tiempo.",o:["más","más,","mas","más que"],a:2,w:"Equivale a pero: mas se le acabó el tiempo."},
{q:"Este ejercicio es ______ claro que el anterior.",o:["mas","más","mas,","más pero"],a:1,w:"Es comparación: más claro."}]},
{t:"Uso de por qué",emoji:"❓",fallo:"Pregunta 40: No entiendo por qué fallé esa pregunta.",exp:"Por qué separado y con tilde se usa en preguntas directas o indirectas. Aunque no tenga signos, puede ser pregunta indirecta.",regla:"Si puedes cambiarlo por por qué razón, escribe por qué.",qs:[
{q:"No sé ______ Jennifer eligió esa respuesta.",o:["porque","porqué","por qué","por que"],a:2,w:"Equivale a por qué razón."},
{q:"¿______ es importante leer primero las instrucciones?",o:["Porque","Por qué","Porqué","Por que"],a:1,w:"Es pregunta directa."},
{q:"La maestra explicó ______ la opción era incorrecta.",o:["por qué","porque","porqué","por que"],a:0,w:"Explicó por qué razón."},
{q:"Quiero saber ______ me equivoqué en la pregunta.",o:["porque","por que","porqué","por qué"],a:3,w:"Pregunta indirecta: quiero saber por qué."},
{q:"Jennifer preguntó ______ debía revisar sus errores.",o:["por qué","porque","porqué","por que"],a:0,w:"La oración expresa pregunta indirecta."}]},
{t:"Eliminar ambigüedad",emoji:"🔎",fallo:"Pregunta 37: María le dijo a Ana que su tarea estaba incompleta.",exp:"Una oración es ambigua cuando puede entenderse de más de una manera. Con su, hay que aclarar de quién se habla.",regla:"Cuando veas su, pregunta: ¿su de quién? Si no queda claro, reescribe.",qs:[
{q:"Luis le dijo a Pedro que su cuaderno estaba roto.",o:["Luis le dijo a Pedro que estaba roto.","Luis le dijo a Pedro que su cuaderno estaba roto.","Luis le dijo a Pedro que el cuaderno de Pedro estaba roto.","Luis dijo que su cuaderno estaba roto."],a:2,w:"Aclara que el cuaderno era de Pedro."},
{q:"Ana le comentó a Laura que su exposición estaba incompleta.",o:["Ana le comentó a Laura que la exposición de Laura estaba incompleta.","Ana le comentó a Laura que su exposición estaba incompleta.","Ana comentó que su exposición estaba incompleta a Laura.","Laura y Ana comentaron su exposición."],a:0,w:"Aclara que la exposición era de Laura."},
{q:"El maestro le dijo a José que su respuesta era incorrecta.",o:["El maestro le dijo a José que su respuesta era incorrecta.","El maestro dijo que era incorrecta.","El maestro le dijo a José que la respuesta de José era incorrecta.","José dijo que su respuesta era incorrecta al maestro."],a:2,w:"Aclara que la respuesta era de José."},
{q:"Claudia le dijo a Sofía que su mochila estaba abierta.",o:["Claudia le dijo a Sofía que la mochila de Sofía estaba abierta.","Claudia le dijo a Sofía que su mochila estaba abierta.","Claudia dijo a Sofía que estaba abierta.","Sofía y Claudia tenían su mochila abierta."],a:0,w:"Aclara que la mochila era de Sofía."},
{q:"Jennifer le explicó a Mariana que su tarea tenía errores.",o:["Jennifer le explicó a Mariana que su tarea tenía errores.","Jennifer explicó que tenía errores.","Jennifer le explicó a Mariana que la tarea de Mariana tenía errores.","Mariana explicó que su tarea tenía errores a Jennifer."],a:2,w:"Aclara que la tarea era de Mariana."}]}];
let ti=0,qi=0,total=0,scores=[];
function $(id){return document.getElementById(id)}
function start(){ti=0;qi=0;total=0;scores=[0,0,0,0];$('home').style.display='none';$('end').style.display='none';$('work').style.display='block';lesson()}
function topbar(){let t=topics[ti];$('topTitle').textContent=t.t;$('topN').textContent=(ti+1)+' de 4';$('fill').style.width=(ti/4*100)+'%'}
function lesson(){topbar();let t=topics[ti];$('content').innerHTML=`<span class="chip">${t.emoji} Tema ${ti+1}</span><h2>${t.t}</h2><div class="fail"><b>Pregunta que falló:</b><br>${t.fallo}</div><p class="sub">${t.exp}</p><div class="rule">${t.regla}</div><button class="btn" onclick="quiz()">Contestar 5 ejercicios</button>`;scrollTo({top:0,behavior:'smooth'})}
function quiz(){qi=0;renderQ()}
function renderQ(){topbar();let t=topics[ti],q=t.qs[qi];$('content').innerHTML=`<span class="chip">${t.emoji} Ejercicio ${qi+1} de 5</span><h2>${t.t}</h2><p class="q">${ti*5+qi+1}. ${q.q}</p><div class="opts">${q.o.map((x,i)=>`<button class="opt" onclick="ans(${i})"><span class="letter">${'ABCD'[i]}</span><span>${x}</span></button>`).join('')}</div><div id="fb" class="fb"></div><div id="next"></div>`;scrollTo({top:0,behavior:'smooth'})}
function ans(sel){let t=topics[ti],q=t.qs[qi],buttons=document.querySelectorAll('.opt');buttons.forEach(b=>b.disabled=true);buttons[sel].classList.add(sel===q.a?'ok':'bad');buttons[q.a].classList.add('ok');let fb=$('fb');if(sel===q.a){scores[ti]++;total++;fb.className='fb good';fb.innerHTML='✅ <b>Correcto.</b><br>'+q.w}else{fb.className='fb wrong';fb.innerHTML='❌ <b>Revisa.</b><br>La respuesta correcta era '+('ABCD'[q.a])+'. '+q.w}$('next').innerHTML=`<br><button class="btn" onclick="next()">${qi===4?'Terminar tema':'Siguiente'}</button>`}
function next(){qi++;if(qi<5)renderQ();else{ti++;if(ti<4)lesson();else finish()}}
function finish(){$('work').style.display='none';$('end').style.display='block';$('score').textContent=total;$('breakdown').innerHTML=topics.map((t,i)=>`<div class="result">${t.emoji} <b>${t.t}</b><br>${scores[i]}/5 correctas · ${scores[i]>=4?'Bien, puede avanzar.':'Repetir este tema.'}</div>`).join('');scrollTo({top:0,behavior:'smooth'})}
</script>
</body>
</html>
