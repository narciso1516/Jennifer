<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Examen Jennifer - Estructura de la Lengua</title>
<style>
:root{--blue:#1a73e8;--purple:#7b61ff;--pink:#ec4899;--text:#263238;--ok:#1e8e3e;--bad:#d93025;--card:#fff}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#eef4ff,#faf5ff);color:var(--text)}header{padding:28px 18px;text-align:center;background:linear-gradient(120deg,var(--blue),var(--purple),var(--pink));color:white}header h1{margin:0;font-size:1.6rem}header p{margin:8px 0 0;font-size:.95rem}.wrap{max-width:860px;margin:auto;padding:18px}.progress{height:14px;background:#dde5ff;border-radius:999px;overflow:hidden;margin:18px 0}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));transition:.35s}.card{background:var(--card);border-radius:22px;padding:22px;box-shadow:0 12px 30px rgba(30,50,120,.12);border:1px solid #e6e9ff}.badge{display:inline-block;background:#eef3ff;color:#2455c3;border-radius:999px;padding:7px 12px;font-weight:bold;font-size:.85rem;margin-bottom:10px}h2{font-size:1.25rem;margin:8px 0 16px}.options{display:grid;gap:10px;margin-top:14px}button.option{width:100%;text-align:left;border:2px solid #e4e7f8;background:#fff;border-radius:14px;padding:14px 15px;font-size:1rem;cursor:pointer;transition:.2s}button.option:hover{transform:translateY(-1px);border-color:#9bb8ff;background:#f8fbff}button.correct{border-color:var(--ok);background:#e9f7ef;color:#0f6b2d}button.wrong{border-color:var(--bad);background:#fdecea;color:#a32018}.feedback{margin-top:14px;padding:12px;border-radius:14px;display:none;font-weight:bold}.feedback.ok{display:block;background:#e9f7ef;color:#0f6b2d}.feedback.bad{display:block;background:#fdecea;color:#a32018}.next{margin-top:16px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--purple));color:white;padding:13px 22px;font-size:1rem;font-weight:bold;cursor:pointer;display:none}.meta{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px;font-size:.9rem;color:#596273}.final{text-align:center;display:none}.final h2{font-size:1.8rem;color:#2455c3}.final .score{font-size:2.4rem;font-weight:bold;margin:12px}.restart{border:none;border-radius:999px;background:#263238;color:white;padding:13px 22px;font-size:1rem;cursor:pointer}
</style>
</head>
<body>
<header><h1>Examen de Reforzamiento para Jennifer</h1><p>Concordancia · Coma · Puntuación · Oración correcta</p></header>
<main class="wrap"><div class="progress"><div class="bar" id="bar"></div></div><section class="card" id="quiz"><div class="meta"><span id="count"></span><span id="topic"></span></div><span class="badge">Solo avanzas si eliges la correcta</span><h2 id="question"></h2><div class="options" id="options"></div><div class="feedback" id="feedback"></div><button class="next" id="nextBtn">Siguiente pregunta</button></section><section class="card final" id="final"><h2>¡Muy bien, Jennifer!</h2><p>Terminaste el examen de reforzamiento.</p><div class="score" id="score"></div><p>Estos son exactamente los temas donde había que afianzar: concordancia, coma, puntuación y oración correcta.</p><button class="restart" onclick="location.reload()">Repetir examen</button></section></main>
<script>
const questions=[
{topic:'Concordancia',q:'Elige la oración con concordancia correcta.',a:['Las niñas juega en el patio.','Los alumnos estudia para el examen.','La maestra explica la lección.','El perros ladran mucho.','Las casa son grandes.'],c:2,exp:'Correcto: “La maestra” es singular y “explica” también está en singular.'},
{topic:'Uso de coma',q:'¿Cuál opción usa correctamente la coma?',a:['Juan compró pan leche queso y arroz.','Juan, compró pan leche queso y arroz.','Juan compró, pan leche queso y arroz.','Juan compró pan, leche, queso y arroz.','Juan compró pan leche, queso y arroz.'],c:3,exp:'Correcto: la coma separa elementos de una enumeración.'},
{topic:'Oración correcta',q:'Elige la oración correcta.',a:['Nosotros fue al mercado.','Ellos camina rápido.','María y Ana estudia juntas.','Tú tiene mucha razón.','Tú tienes mucha razón.'],c:4,exp:'Correcto: “Tú” concuerda con “tienes”.'},
{topic:'Puntuación',q:'¿Cuál oración tiene puntuación correcta?',a:['Tengo tres colores favoritos: azul, rojo y verde.','Tengo tres colores favoritos azul rojo y verde.','Tengo: tres colores favoritos azul rojo y verde.','Tengo tres colores, favoritos azul rojo y verde.','Tengo tres colores favoritos; azul, rojo y verde.'],c:0,exp:'Correcto: los dos puntos introducen una enumeración.'},
{topic:'Concordancia',q:'Elige la oración con concordancia correcta.',a:['La casa son grande.','Los libros está sobre la mesa.','El niño está cansado.','Las flores es bonitas.','El niñas están contentas.'],c:2,exp:'Correcto: “El niño” y “está cansado” concuerdan en singular masculino.'},
{topic:'Uso de coma',q:'¿Dónde está mejor usada la coma?',a:['María si puedes, ven temprano.','María si, puedes ven temprano.','María, si puedes, ven temprano.','María si puedes ven, temprano.','María, si puedes ven temprano.'],c:2,exp:'Correcto: “María” es vocativo y “si puedes” es una aclaración.'},
{topic:'Concordancia',q:'Elige la oración correcta.',a:['El grupo de estudiantes llegaron tarde.','El grupo de estudiantes llegar tarde.','El grupo de estudiantes llegan tarde.','El grupo de estudiantes llegó tarde.','El grupo de estudiantes llegaban tarde.'],c:3,exp:'Correcto: el núcleo del sujeto es “grupo”, singular; por eso “llegó”.'},
{topic:'Uso de coma',q:'¿Cuál opción usa correctamente la coma explicativa?',a:['Mi hermano que vive, en Veracruz vendrá mañana.','Mi hermano que vive en Veracruz, vendrá, mañana.','Mi hermano que, vive en Veracruz vendrá mañana.','Mi hermano, que vive en Veracruz, vendrá mañana.','Mi hermano que vive en Veracruz vendrá, mañana.'],c:3,exp:'Correcto: la frase “que vive en Veracruz” va entre comas porque explica.'},
{topic:'Puntuación',q:'Elige la oración con puntuación correcta.',a:['Llegué tarde sin embargo entregué la tarea.','Llegué tarde, sin embargo entregué la tarea.','Llegué tarde sin embargo, entregué la tarea.','Llegué tarde. sin embargo, entregué la tarea.','Llegué tarde; sin embargo, entregué la tarea.'],c:4,exp:'Correcto: “sin embargo” debe ir separado con signos de puntuación.'},
{topic:'Oración correcta',q:'¿Cuál oración está correctamente escrita?',a:['Mis amigos y yo fue al cine.','Mis amigos y yo fuimos al cine.','Mis amigos y yo fueron al cine.','Mis amigos y yo fui al cine.','Mis amigos y yo va al cine.'],c:1,exp:'Correcto: “Mis amigos y yo” equivale a “nosotros”; por eso “fuimos”.'},
{topic:'Uso de coma',q:'Elige la opción correcta.',a:['No, quiero comer.','No quiero, comer.','No quiero comer,','No quiero comer.','No, quiero, comer.'],c:3,exp:'Correcto: no debe separarse el verbo “quiero” de su complemento “comer”.'},
{topic:'Concordancia',q:'Elige la oración con concordancia correcta.',a:['Las mesas está limpias.','La mesas están limpia.','Las mesa están limpio.','La mesa están limpias.','Las mesas están limpias.'],c:4,exp:'Correcto: “Las mesas” es plural femenino; “están limpias” también.'},
{topic:'Puntuación',q:'¿Cuál oración tiene puntuación correcta?',a:['Estudié mucho por eso, aprobé.','Estudié, mucho por eso aprobé.','Estudié mucho, por eso aprobé.','Estudié mucho por, eso aprobé.','Estudié mucho por eso aprobé,'],c:2,exp:'Correcto: la coma separa la causa de la consecuencia.'},
{topic:'Uso de coma',q:'¿Cuál opción usa correctamente la coma del vocativo?',a:['Ana ven, aquí.','Ana ven aquí,','Ana, ven aquí.','Ana, ven, aquí.','Ana ven aquí.'],c:2,exp:'Correcto: cuando llamamos a alguien, su nombre se separa con coma.'},
{topic:'Oración correcta',q:'Elige la oración correcta.',a:['Habían muchas personas en la plaza.','Habían una persona en la plaza.','Había muchas persona en la plaza.','Había muchas personas en la plaza.','Habían mucha personas en la plaza.'],c:3,exp:'Correcto: en este uso, “había” permanece en singular.'},
{topic:'Puntuación',q:'¿Cuál opción tiene los signos correctos?',a:['Donde está mi cuaderno?','¿Dónde está mi cuaderno.','Dónde está mi cuaderno?','¿Dónde está mi cuaderno?','¿Donde está mi cuaderno?'],c:3,exp:'Correcto: en español se usan signos de apertura y cierre: ¿ ?'},
{topic:'Concordancia',q:'Elige la oración con concordancia correcta.',a:['El agua está fría.','El agua están frías.','La agua está frío.','El agua es fríos.','La agua están fría.'],c:0,exp:'Correcto: aunque se dice “el agua”, el adjetivo va en femenino: fría.'},
{topic:'Puntuación',q:'¿Cuál oración usa correctamente los dos puntos y las comas?',a:['Me gustan estos deportes fútbol básquetbol y voleibol.','Me gustan estos deportes, fútbol básquetbol y voleibol.','Me gustan: estos deportes fútbol, básquetbol y voleibol.','Me gustan estos deportes: fútbol, básquetbol y voleibol.','Me gustan estos deportes; fútbol, básquetbol y voleibol.'],c:3,exp:'Correcto: los dos puntos introducen la lista y las comas separan los elementos.'},
{topic:'Oración correcta',q:'Elige la oración correctamente construida.',a:['Ayer fuimos al parque después de estudiar.','Ayer fuimos después estudiar al parque.','Fuimos ayer al estudiar parque después.','Después parque fuimos estudiar ayer.','Ayer al parque estudiar después fuimos.'],c:0,exp:'Correcto: la oración tiene orden claro: tiempo + sujeto omitido + acción + lugar + complemento.'},
{topic:'Concordancia',q:'Elige la oración con concordancia correcta.',a:['La mayoría de los alumnos aprobar.','La mayoría de los alumnos aprueba el exámenes.','La mayoría de los alumnos aprobó el examen.','La mayoría de los alumnos aprobaron el exámenes.','La mayoría de los alumno aprobó el examen.'],c:2,exp:'Correcto: “La mayoría” es singular y concuerda con “aprobó”.'}];
let current=0,correctCount=0,locked=false;const qEl=document.getElementById('question'),optEl=document.getElementById('options'),fb=document.getElementById('feedback'),next=document.getElementById('nextBtn'),count=document.getElementById('count'),topic=document.getElementById('topic'),bar=document.getElementById('bar');function render(){locked=false;next.style.display='none';fb.className='feedback';fb.textContent='';const item=questions[current];count.textContent=`Pregunta ${current+1} de ${questions.length}`;topic.textContent=item.topic;qEl.textContent=item.q;optEl.innerHTML='';bar.style.width=current/questions.length*100+'%';item.a.forEach((txt,i)=>{const b=document.createElement('button');b.className='option';b.innerHTML=`<strong>${String.fromCharCode(65+i)})</strong> ${txt}`;b.onclick=()=>check(i,b);optEl.appendChild(b)})}function check(i,btn){if(locked)return;const item=questions[current];if(i===item.c){locked=true;btn.classList.add('correct');correctCount++;fb.className='feedback ok';fb.textContent='✅ '+item.exp;next.style.display='inline-block'}else{btn.classList.add('wrong');fb.className='feedback bad';fb.textContent='❌ Intenta otra vez. Revisa concordancia, coma o puntuación antes de avanzar.'}}next.onclick=()=>{current++;current<questions.length?render():finish()};function finish(){document.getElementById('quiz').style.display='none';document.getElementById('final').style.display='block';bar.style.width='100%';document.getElementById('score').textContent='20 / 20'}render();
</script>
</body>
</html>
