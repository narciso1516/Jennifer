<!doctype html><html lang='es'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Simulacro 3 Matemáticas Jennifer</title><style>body{margin:0;font-family:Arial,sans-serif;background:#f6f8fc;color:#172033}header{padding:34px 14px;text-align:center;color:white;background:linear-gradient(135deg,#0b57d0,#7b61ff)}main{max-width:820px;margin:auto;padding:18px}.card{background:white;border:1px solid #dfe6f3;border-radius:22px;padding:22px;margin:16px 0;box-shadow:0 14px 34px #0001}.hide{display:none}.bar{height:14px;background:#e8eefc;border-radius:99px;overflow:hidden}.fill{height:100%;background:#1a73e8;width:0}.q{font-size:1.25rem;font-weight:900;line-height:1.45}.n{background:#0b57d0;color:white;border-radius:99px;padding:7px 11px;margin-right:7px}button{width:100%;padding:14px;margin:8px 0;border-radius:14px;border:1px solid #dfe6f3;background:#fbfcff;text-align:left;font-weight:800}.start{background:#0b57d0;color:white;text-align:center;border:0}.msg{padding:14px;border-radius:14px;background:#fff1ef;color:#b42318}.ok{background:#edf9f0;color:#067647}</style></head><body><header><h1>Simulacro 3 de Matemáticas</h1><p>Jennifer · preguntas nuevas del examen</p></header><main><section id='intro' class='card'><h2>Reglas</h2><p>Responde una por una. Si una elección no coincide con la clave interna, el reto vuelve a la pregunta 1. Los incisos están mezclados.</p><button class='start' onclick='start()'>Iniciar</button></section><section id='exam' class='card hide'><div class='bar'><div id='fill' class='fill'></div></div><p><b>Progreso:</b> <span id='prog'></span></p><p id='q' class='q'></p><div id='ops'></div><div id='msg'></div><button class='start' onclick='restart()'>Reiniciar</button></section><section id='done' class='card hide'><h2>Completado</h2><p class='msg ok'>Jennifer completó este simulacro.</p><button class='start' onclick='start()'>Practicar otra vez</button></section></main><script>const P=[['¿Cuánto es 15 + 6 × 3?',['63','33','45','21'],1],['¿Cuánto es (40 - 16) / 4?',['8','12','6','10'],2],['¿Cuánto es 2/5 + 1/5?',['3/10','2/10','3/5','1/5'],2],['¿Cuánto es 3/4 de 20?',['10','15','12','18'],1],['El 10% de 350 es:',['30','45','35','50'],2],['El 40% de 90 es:',['36','45','30','40'],0],['Si 7 cuadernos cuestan 84, ¿cuánto cuesta 1?',['14','10','12','16'],2],['Si 5 boletos cuestan 150, ¿cuánto cuestan 8?',['220','240','260','200'],1],['Promedio de 6, 8, 10 y 10:',['9','8.5','8','7.5'],1],['Promedio de 4, 6, 8:',['7','5','6','8'],2],['4, 8, 12, 16, ___',['18','20','24','22'],1],['3, 9, 27, 81, ___',['162','243','108','324'],1],['50, 45, 40, 35, ___',['25','30','32','28'],1],['2, 5, 10, 17, 26, ___',['35','37','38','40'],1],['Probabilidad de sacar 1 en un dado:',['1/6','1/3','2/6','5/6'],0],['Bolsa con 4 azules y 6 negras. Probabilidad de azul:',['6/10','2/5','4/6','1/4'],1],['Raíz cuadrada de 121:',['12','10','11','13'],2],['Raíz cuadrada de 144:',['14','11','10','12'],3],['6 al cuadrado es:',['12','18','36','30'],2],['2 a la cuarta potencia es:',['8','12','16','6'],2],['x + 12 = 30. x vale:',['18','20','16','42'],0],['2x = 26. x vale:',['12','14','13','15'],2],['x/4 = 5. x vale:',['9','20','16','24'],1],['x - 9 = 19. x vale:',['10','26','28','30'],2],['Área de rectángulo base 9 altura 3:',['18','27','30','12'],1],['Perímetro de triángulo con lados 4, 5 y 6:',['20','14','15','24'],2],['En tabla: lunes 12 ventas y martes 15. Total:',['25','27','30','22'],1],['Si 45 de 100 respuestas son correctas, es:',['55%','45%','40%','50%'],1],['Una figura aumenta 2 puntos cada paso: 3,5,7. Sigue:',['8','10','9','11'],2],['Si un reloj avanza 15 minutos tres veces, avanzó:',['30 min','45 min','60 min','15 min'],1]];let i=0;function start(){i=0;intro.classList.add('hide');done.classList.add('hide');exam.classList.remove('hide');show()}function show(){msg.textContent='';prog.textContent=(i+1)+' / '+P.length;fill.style.width=(i/P.length*100)+'%';q.innerHTML='<span class=n>'+(i+1)+'</span>'+P[i][0];ops.textContent='';P[i][1].forEach((o,j)=>{let b=document.createElement('button');b.textContent='ABCD'[j]+') '+o;b.onclick=()=>ans(j);ops.appendChild(b)})}function ans(v){if(v===P[i][2]){i++;if(i>=P.length){exam.classList.add('hide');done.classList.remove('hide')}else show()}else{msg.className='msg';msg.textContent='El reto vuelve al inicio.';setTimeout(()=>{i=0;show()},1000)}}function restart(){i=0;show()}</script></body></html>
